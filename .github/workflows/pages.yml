name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Jekyll home page
        run: |
          {
            echo "---"
            echo "layout: default"
            echo "title: Awesome Ads"
            echo "permalink: /"
            echo "---"
            cat README.md
          } > index.md

      - uses: actions/configure-pages@v6

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - uses: actions/upload-pages-artifact@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
